name: Axezent AI CTR Green CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  python:
    name: Python checker and receipt examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run passing receipt
        run: |
          python axezent_ctr_checker.py verify passing_receipt.json --policy software_safe_v1.json

      - name: Confirm forbidden-file receipt rejects
        run: |
          set +e
          python axezent_ctr_checker.py verify failing_receipt_modified_forbidden_file.json --policy software_safe_v1.json
          code=$?
          if [ "$code" -ne 1 ]; then
            echo "Expected forbidden-file receipt to reject with exit code 1, got $code"
            exit 1
          fi

      - name: Confirm failed-tests receipt rejects
        run: |
          set +e
          python axezent_ctr_checker.py verify failing_receipt_tests_failed.json --policy software_safe_v1.json
          code=$?
          if [ "$code" -ne 1 ]; then
            echo "Expected failed-tests receipt to reject with exit code 1, got $code"
            exit 1
          fi

      - name: Run Python tests
        run: |
          python -m pytest test_checker.py

  rust:
    name: Rust runtime scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: |
          cargo test

      - name: Run Rust demo
        run: |
          cargo run

  source-audit:
    name: Source audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit sources
        run: |
          python audit_sources.py
